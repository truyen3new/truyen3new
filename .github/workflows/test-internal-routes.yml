name: Worker E2E Smoke Tests

on:
  push:
    branches: [main, feature/**]
  pull_request:
    branches: [main]

jobs:
  worker-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm
      
      - name: Install deps
        run: npm ci
      
      - name: Start wrangler dev
        run: |
          npx wrangler dev --config workers/unified-gateway/wrangler.jsonc --port 8787 &
          echo "Waiting for worker to start..."
          for _ in $(seq 1 30); do
            curl -sf http://localhost:8787/api/stories?page=1\&pageSize=3 2>/dev/null && break
            sleep 2
          done
        env:
          SUPABASE_URL: https://example.supabase.co
          SUPABASE_ANON_KEY: dummy_key
          SUPABASE_JWKS_URL: https://example.supabase.co/auth/v1/.well-known/jwks.json
      
      - name: Test /api/stories
        run: |
          echo "=== GET /api/stories ==="
          RESULT=$(curl -sf "http://localhost:8787/api/stories?page=1&pageSize=3" 2>&1)
          echo "$RESULT" | head -c 500
          echo ""
          echo "$RESULT" | python3 -c "import sys,json; d=json.load(sys.stdin); assert d.get('success')==True; assert 'data' in d; print('stories: OK')"
      
      - name: Test /api/taxonomy/categories (via supabase proxy)
        run: |
          echo "=== GET /api/supabase/categories ==="
          RESULT=$(curl -sf "http://localhost:8787/api/supabase/categories?select=*" 2>&1)
          echo "$RESULT" | head -c 500
          echo ""
      
      - name: Health check (404 route)
        run: |
          echo "=== GET /unknown-route ==="
          curl -s "http://localhost:8787/api/unknown-route" | python3 -c "import sys,json; d=json.load(sys.stdin); assert d.get('success')==False; assert d.get('error') is not None; print('404 handling: OK')"
