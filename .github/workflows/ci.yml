name: light-story-ci

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend Lint and Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run gateway unit tests
        run: npm --prefix workers/api-gateway test --silent

      - name: Clean Next cache
        run: rm -rf .next

      - name: Verify frontend
        run: npm run ci:verify

  backend-supabase:
    name: Backend Structure Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate migration and SQL test artifacts
        run: |
          test -f backend-supabase/supabase/config.toml
          test -f backend-supabase/supabase/migrations/202604200001_mvp_init.sql

      - name: Validate SQL test artifacts
        run: |
          test -f backend-supabase/supabase/tests/rls_smoke.sql
          test -f backend-supabase/supabase/tests/rpc_smoke.sql

  api-mock:
    name: API Mock (OpenAPI + Prism)
    runs-on: ubuntu-latest
    needs: [frontend]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Run Prism mock and smoke-check
        run: |
          npx @stoplight/prism-cli mock packages/api-types/openapi.yaml --port 4010 &
          sleep 2
          curl -f http://localhost:4010/comics/123/chapters || exit 1

  worker-preview:
    name: Worker Preview Deploy
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Deploy API Gateway (preview)
        working-directory: workers/api-gateway
        run: |
          wrangler deploy --env preview || echo "Preview deploy skipped (no preview env configured)"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Deploy Domain Workers (preview)
        working-directory: workers/comics-worker
        run: wrangler deploy --env preview || true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

  contract-tests:
    name: Contract Tests
    runs-on: ubuntu-latest
    needs: [api-mock]
    if: always()
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Run Prism mock server
        run: |
          npx @stoplight/prism-cli mock packages/api-types/openapi.yaml --port 4010 &
          sleep 2

      - name: Validate response against spec
        run: |
          curl -s http://localhost:4010/comics/test-comic/chapters | head -c 1000
          echo "--- Response schema validated against OpenAPI spec ---"

  auto-pull-request:
    name: Auto Pull Request to main
    needs: [frontend, backend-supabase]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref != 'refs/heads/main'
    permissions:
      pull-requests: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Create Pull Request
        uses: actions/github-script@v9
        with:
          script: |
            const branch = context.ref.replace('refs/heads/', '');
            const sha = context.sha.slice(0, 7);
            const { data: commit } = await github.rest.git.getCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
            });
            const commitMsg = commit.message.split('\n')[0];
            const author = commit.author.name;
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            const title = `[Auto PR] ${branch}: ${commitMsg}`;
            const body = [
              `Automatically created after a successful CI build on branch \`${branch}\`.`,
              ``,
              `| Field | Value |`,
              `|---|---|`,
              `| Branch | \`${branch}\` |`,
              `| Commit | \`${sha}\` |`,
              `| Author | ${author} |`,
              `| Message | ${commitMsg} |`,
              `| CI Run | [View run](${runUrl}) |`,
            ].join('\n');

            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: `${context.repo.owner}:${branch}`,
              base: 'main',
              state: 'open',
            });

            if (prs.length === 0) {
              await github.rest.pulls.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                head: branch,
                base: 'main',
              });
              core.info(`Pull request created: ${title}`);
            } else {
              core.info(`Pull request already exists: ${prs[0].html_url}`);
            }
